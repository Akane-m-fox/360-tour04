<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Hateruma 360 Tour</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="tour-logic.js"></script>
  </head>
  <body>
   <a-scene tour-manager 
         cursor="rayOrigin: mouse" 
         raycaster="objects: .clickable; far: 100">
  
	  <a-sky id="main-sky" material="opacity: 1; transparent: true"></a-sky>
	  <a-entity id="hotspot-group"></a-entity>

	  <a-entity id="cam-rig" position="0 1.6 0" rotation="0 -90 0">
		<a-entity camera look-controls="reverseMouseDrag: true" id="main-camera"></a-entity>
	  </a-entity>
	</a-scene>
  </body>
</html>
